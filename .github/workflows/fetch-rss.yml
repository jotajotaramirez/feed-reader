name: Update Welele Archive

on:
  schedule:
    # Ejecuta cada día a las 00:00, 06:00, 12:00, y 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar script Welele Archiver
        run: node scripts/fetch_rss.js

      - name: Guardar cambios si hay artículos nuevos
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-archivar nuevas entradas de Welele"
          file_pattern: "welele_archive.json"
          commit_user_name: "Welele Bot"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "Welele Bot <github-actions[bot]@users.noreply.github.com>"
