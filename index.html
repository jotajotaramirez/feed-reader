<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welele Reader</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
    </div>
    
    <div id="start-screen">
        <div class="start-content">
            <img src="icon.png" alt="Welele Logo" class="start-logo">
            <h1>Welele Reader</h1>
            <p id="start-subtitle"></p>
            <div id="start-unread-info" class="start-info" style="display: none;">
                Tienes <strong id="start-unread-count">0</strong> pendientes
            </div>
            <button id="btn-start" class="start-btn">Comenzar a leer</button>
            <button id="btn-view-favorites" class="start-btn secondary" style="display: none;">❤️ Ver mis favoritos (<span id="start-favorites-count">0</span>)</button>
            <button id="btn-export" class="export-btn">⬇️ Exportar backup de leídos</button>
        </div>
    </div>
    
    <iframe id="welele-frame" src="about:blank" title="Welele Content" allowfullscreen sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
    
    <nav id="bottom-bar">
        <div class="left-actions">
            <button id="btn-unread" class="action-btn" title="Marcar como no visto">
                <svg id="unread-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <span id="unread-text">Visto</span>
            </button>
            <button id="btn-favorite" class="action-btn icon-only" title="Añadir a favoritos">
                <svg id="favorite-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </button>
        </div>
        <div class="nav-buttons-group">
            <button id="btn-prev" class="nav-btn" title="Anterior" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <button id="btn-next" class="nav-btn" title="Siguiente" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
        <div id="center-info">
            <span id="unread-count">0</span>
            <span class="small-text">pendientes</span>
        </div>
    </nav>
    <script src="app.js"></script>
</body>
</html>
